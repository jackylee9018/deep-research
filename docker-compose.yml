services:
  deep-research:
    container_name: deep-research
    build: .
    env_file:
      - .env.local
    environment:
      # Override in .env.local; used at runtime by GET /api/app-config
      OPENWEBUI_URL: ${OPENWEBUI_URL:-https://ai.spit.hk}
      PRESENTATION_AI_URL: ${PRESENTATION_AI_URL:-http://localhost:9081}
    ports:
      - '9080:9080'
